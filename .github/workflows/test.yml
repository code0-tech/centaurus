name: Run Tests
on:
  push:
    branches:
      - 'main'
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: '24.x'
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci
      - run: npm run build
      - run: npm run lint
      - run: npm run test
      - name: Validate generated documentation
        run: |
          npm run generate:docs
          if ! git diff --quiet; then
            git --no-pager diff
            exit 1
          fi